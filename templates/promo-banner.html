<!--
  @ac/promo-banner - HTML template
  Use this structure with your content. Import dist/promo-banner.css for styles.
-->

<section class="ac-promo-banner">
  <div class="ac-promo-banner__container">
    <div class="ac-promo-banner__card">
      <!-- Background image -->
      <div class="ac-promo-banner__card-bg">
        <img
          class="ac-promo-banner__card-img"
          src="YOUR_IMAGE_URL"
          alt=""
          aria-hidden="true"
        />
        <div class="ac-promo-banner__card-gradient" aria-hidden="true"></div>
      </div>

      <!-- Content -->
      <div class="ac-promo-banner__content">
        <div class="ac-promo-banner__row">
          <div class="ac-promo-banner__body">
            <span class="ac-promo-banner__badge">Recommended for you</span>
            <h3 class="ac-promo-banner__headline">Your headline here</h3>
            <p class="ac-promo-banner__description">
              Your description text goes here.
            </p>
            <div class="ac-promo-banner__dates">
              <div class="ac-promo-banner__date">
                <span class="ac-promo-banner__date-label">Book by</span>
                <span class="ac-promo-banner__date-value">Mar 15, 2025</span>
              </div>
              <div class="ac-promo-banner__date-sep" aria-hidden="true"></div>
              <div class="ac-promo-banner__date">
                <span class="ac-promo-banner__date-label">Travel by</span>
                <span class="ac-promo-banner__date-value">Jun 30, 2025</span>
              </div>
            </div>
          </div>
          <div class="ac-promo-banner__cta">
            <a
              href="#"
              class="ac-promo-banner__cta-btn"
              target="_blank"
              rel="noopener noreferrer"
            >
              Book now
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
